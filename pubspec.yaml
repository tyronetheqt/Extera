dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_test:
    sdk: flutter
  import_sorter: ^4.6.0
#  integration_test:
#    sdk: flutter
  license_checker: ^1.6.2
  msix: ^3.6.13
  translations_cleaner: ^0.1.0

flutter_native_splash:
  color: "#ffffff"
  color_dark: "#000000"
  image: "assets/info-logo.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
    - assets/sounds/ringtones/
    - assets/font/
  fonts:
    - family: 'Twemoji Mozilla'
      fonts:
        - asset: assets/font/Twemoji.v0.7.0.ttf

msix_config:
  display_name: Extera Next
  publisher_display_name: Extera Next
  publisher: CN=Extera, O=HQ of bad forks of good things, L=Matrix, S=Internet, C=RU
  identity_name: xyz.extera.next
  logo_path: assets\logo.png
  capabilities: internetClient, location, microphone, webcam
  protocol_activation: https
  app_uri_handler_hosts: extera.xyz, fluffychat.im, matrix.to
  execution_alias: exteranext
  sign_msix: false
  install_certificate: false

dependency_overrides:
  record_linux: 1.3.0
